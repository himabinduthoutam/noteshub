<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Note</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #fbf7d4;
            font-family: Arial, sans-serif;
        }

        /* Main page layout */
        .note-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #2c2c2c;
            color: white;
            padding: 12px 16px;
            font-size: 18px;
        }

        /* Title row */
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 2px solid #d4a574;
            background: #fbf7d4;
        }

        .title-row input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 18px;
            width: 70%;
        }

        .date {
            font-size: 14px;
            color: #555;
        }

        /* Content area (90% height effect) */
        .content-wrapper {
            flex: 1;                 /* fills remaining height */
            background: #fbf7d4;
            overflow: hidden;
        }

       textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;

            font-size: 16px;
            line-height: 32px;

            padding: 0 16px;
            padding-top: 8px;

            background-color: transparent;

            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 31px,
                rgba(0,0,0,0.25) 32px
            );

            background-attachment: local; /* 🔥 THIS makes lines scroll */
            overflow-y: auto;
        }


        /* Save button fixed at bottom */
        .save-bar {
            background: #2c2c2c;
            padding: 10px;
            text-align: center;
        }

        .save-bar button {
            background: #d4a574;
            border: none;
            padding: 8px 32px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .save-bar button:hover {
            background: #c2a062;
        }
    </style>
</head>

<body>

<form method="post">
    {% csrf_token %}

    <div class="note-page">

        <!-- Header -->
        <div class="header">
            ← Notepad
        </div>

        <!-- Title + Date -->
        <div class="title-row">
            <input type="text" name="title" placeholder="Title" required>
            <span class="date">{{ today }}</span>
        </div>

        <!-- Content -->
        <div class="content-wrapper">
            <textarea name="content" required></textarea>
        </div>

        <!-- Save -->
        <div class="save-bar">
            <button type="submit">Save</button>
        </div>

    </div>
</form>

</body>
</html>
